name: Build and release library to PyPi

on:
  workflow_call:
    inputs:
      library_path:
        required: true
        type: string
      ref_name:
        required: true
        type: string
    secrets:
      ORG_PAT:
        required: true

permissions:
  contents: write
  pull-requests: write
  packages: read
  issues: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: uv run pytest -s -vv

      - name: Build binary
        env:
          LIBRARY_PATH: ${{ inputs.library_path }}
          REF_NAME: ${{ inputs.ref_name }}
        run: |
          echo "__version__ = \"${REF_NAME}\"" > ${LIBRARY_PATH}/version.py
          uv build

      - name: Publish
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv run twine upload --username "__token__" --password ${PYPI_TOKEN} --skip-existing --verbose dist/*
