name: Bump version tag on merge

on:
  workflow_call:
    secrets:
      ORG_PAT:
        required: true

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    concurrency:
      group: tag-main
      cancel-in-progress: false

    env:
      PAT: ${{ secrets.ORG_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          git fetch --tags
          tag=$(git tag --list "v*" \
            | grep -Ev -- '-beta' \
            | sort -V \
            | tail -n 1)
          echo "tag=${tag:-v0.0.0}" >> $GITHUB_OUTPUT

      - name: Determine bump
        id: bump
        run: |
          labels='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$labels" | grep -q "bump:major"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$labels" | grep -q "bump:minor"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$labels" | grep -q "bump:patch"; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "No bump label found" >&2
            exit 0
          fi

      - name: Calculate next version
        id: version
        if: steps.bump.outputs.type != ''
        run: |
          BRANCH="${{ github.event.pull_request.base.ref }}"
          v=${{ steps.latest.outputs.tag }}
          v=${v#v}
          IFS=. read major minor patch <<< "$v"

          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac

          BASE_VERSION="$major.$minor.$patch"

          if [[ "$BRANCH" == "development" ]]; then
            EXISTING=$(git tag -l "v$BASE_VERSION-beta*" | sort -V | tail -n 1)

            if [[ -z "$EXISTING" ]]; then
              NEXT="v$BASE_VERSION-beta.1"
            else
              NUM=$(echo "$EXISTING" | sed -E 's/.*beta\.?([0-9]*)/\1/')
              NEXT="v$BASE_VERSION-beta.$((NUM+1))"
            fi

          else
            NEXT="v$BASE_VERSION"
          fi

          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.bump.outputs.type != ''
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          TAG=${{ steps.version.outputs.next }}

          git tag "$TAG"

          git push https://x-access-token:${PAT}@github.com/${{ github.repository }}.git refs/tags/$TAG
